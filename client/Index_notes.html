<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App - Authentication</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f5f7fb;
        }

        /* Split Screen Layout */
        .container {
            display: flex;
            width: 100%;
        }

        /* Left Side: Image/Visual Banner */
        .left-side {
            flex: 1;
            background-color: #e2e8f0; /* Fallback color */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* Center image if it's smaller */
            padding: 0; /* Remove padding to allow image to span entire area */
            overflow: hidden; /* Ensure image doesn't overflow */
        }

        .left-side img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Crucial for responsiveness and covering the area */
            object-position: center; /* Center the image within its container */
        }

        /* Right Side: Auth Forms */
        .right-side {
            width: 450px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.05);
        }

        .form-box {
            width: 100%;
        }

        .form-box h2 {
            font-size: 2rem;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .form-box p {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* Form Controls */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background-color: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .auth-btn:hover {
            background-color: #f59e0b;
        }

        .switch-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #4b5563;
        }

        .switch-text a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        /* Utility class to hide forms */
        .hidden {
            display: none;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .left-side {
                display: none;
            }
            .right-side {
                width: 100%;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Left Side: App Intro Image -->
        <div class="left-side">
            <!-- Replace 'welcome-image.jpg' with your actual image file path -->
            <img src="notes_idx_img.png" alt="Welcome Image">
        </div>

        <!-- Right Side: Interaction Area -->
        <div class="right-side">
            
            <!-- LOGIN FORM -->
            <div id="login-form-box" class="form-box">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required placeholder="name@example.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <!-- HTML5 validation: minimum 6 characters -->
                        <input type="password" id="login-password" required minlength="6" placeholder="••••••••">
                    </div>
                    <button type="submit" class="auth-btn">Log In</button>
                </form>
                
                <p class="switch-text">
                    Don't have an account? <a href="#" id="to-signup">Sign Up</a>
                </p>
            </div>

            <!-- SIGN UP FORM (Hidden by default) -->
            <div id="signup-form-box" class="form-box hidden">
                <h2>Create Account</h2>
                <p>Join us to start managing your personal notes.</p>
                
                <form id="signup-form">
                    <div class="input-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" required placeholder="johndoe">
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" required placeholder="name@example.com">
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <!-- HTML5 validation: minimum 6 characters -->
                        <input type="password" id="signup-password" required minlength="6" placeholder="••••••••">
                    </div>
                    <button type="submit" class="auth-btn">Sign Up</button>
                </form>
                
                <p class="switch-text">
                    Already have an account? <a href="#" id="to-login">Log In</a>
                </p>
            </div>

        </div>
    </div>

    <!-- JavaScript to toggle between Login and Signup panels and validate forms -->
   
    <script src="index_notes.js"></script>
</body>
</html>
